<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto Certo — Chatbot Status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0f1e;
            color: #f0f4fc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #111d33;
            border: 1px solid rgba(138,155,194,0.12);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
        }
        .icon { font-size: 3rem; margin-bottom: 16px; }
        h1 { font-size: 1.4rem; margin-bottom: 8px; }
        .status { color: #00e676; font-weight: 600; margin-bottom: 16px; }
        p { color: #8a9bc2; font-size: 0.9rem; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🤖</div>
        <h1>Ponto Certo Informática</h1>
        <div class="status">✅ Bot Online — 24h</div>
        <p>Chatbot IA ativo no WhatsApp.<br>Envie uma mensagem para (22) 98817-9813</p>
    </div>
</body>
</html>
